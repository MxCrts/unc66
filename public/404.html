<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>UNC 66</title>
    <!--
      GitHub Pages ne sait pas router les URLs internes d'une SPA (ex: /unc66/contact) :
      il renvoie 404 sur toute URL qui n'est pas un vrai fichier. Cette page (servie
      automatiquement par GitHub Pages en cas de 404) redirige vers index.html en
      encodant le chemin demandé dans le query string, qui est ensuite décodé par le
      script correspondant dans index.html. Technique standard : rafgraph/spa-github-pages.
    -->
    <script type="text/javascript">
      var segmentCount = 1; // nombre de segments du "base" Vite (/unc66/ = 1 segment)
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
